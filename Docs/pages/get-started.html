                    <section id="get-started">
                        <h2>1. 快速获取 API 密钥</h2>
                        <p>要开始调用我们的 GPT 服务，您需要首先在控制台生成专属的 API 密钥 (Auth Token)。</p>
                        <p>访问 <a href="https://codesurf.ccwu.cc/" target="_blank">CodexSurf 控制台</a> 进行以下操作：</p>
                        <ul>
                            <li>点击 <strong>「API 密钥」-「创建密钥」</strong></li>
                            <li><strong>名称:</strong> 随便填写方便自己区分即可</li>
                            <li><strong>令牌分组:</strong> 根据实际需要选择（必填项，不能留空）</li>
                            <li><strong>额度建议:</strong> 设置为无限额度</li>
                            <li>其他选项保持默认</li>
                        </ul>
                        <p style="margin-top: 1rem; color: #db2777;">*注意：生成的 <code>sk-xxxxxx</code>
                            格式字符串就是您的专属密钥，请妥善保管，切勿泄露给他人。</p>
                    </section>

    </main>
